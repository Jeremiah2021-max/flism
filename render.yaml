services:
  # ─────────────────────────────────────────────────────────────
  # Student App + API  →  https://flism-app.onrender.com
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: flism-app
    runtime: node
    env: node
    region: frankfurt
    plan: free
    nodeVersion: 20
    buildCommand: >-
      cd server && npm install --no-workspaces && cd ../mobile &&
      npm install --legacy-peer-deps --ignore-scripts && EXPO_PUBLIC_API_URL=https://flism-app.onrender.com
      npx expo export --platform web --output-dir ../server/public
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://flism-app.onrender.com

  # ─────────────────────────────────────────────────────────────
  # Admin Panel  →  https://flism-admin.onrender.com
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: flism-admin
    runtime: static
    buildCommand: >-
      cd admin-app && npm install &&
      EXPO_PUBLIC_API_URL=https://flism-app.onrender.com
      npx expo export --platform web --output-dir dist
    staticPublishPath: admin-app/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://flism-app.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
