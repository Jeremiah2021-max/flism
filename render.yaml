services:
  # ─────────────────────────────────────────────────────────────
  # 1. Express API  →  https://flism-app.onrender.com
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: flism-app
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install --no-workspaces
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false

  # ─────────────────────────────────────────────────────────────
  # 2. Admin Panel  →  https://flism-admin.onrender.com
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: flism-admin
    runtime: static
    buildCommand: cd admin-app && npm install && npx expo export --platform web --output-dir dist
    staticPublishPath: admin-app/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://flism-app.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
