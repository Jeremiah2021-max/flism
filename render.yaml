services:
  - type: web
    name: flism-app
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: |
      npm install
      cd mobile && npx expo export --platform web --output-dir dist
      cd ../admin-app && npx expo export --platform web --output-dir dist
      cd ../server && npm install
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
